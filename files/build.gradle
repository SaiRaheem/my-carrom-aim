// ─────────────────────────────────────────────────────────────────────────────
// app/build.gradle
// ─────────────────────────────────────────────────────────────────────────────
plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    compileSdk 34
    defaultConfig {
        applicationId "com.carromassist"
        minSdk 29          // Android 10+ required for MediaProjection foreground type
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'

    // OpenCV Android SDK
    // Download from: https://opencv.org/releases/ → Android pack
    // Then: File > New > Import Module → select OpenCV-android-sdk/sdk
    // And add:  implementation project(':opencv')
    // OR use the Maven artifact (easier):
    implementation 'org.opencv:opencv:4.9.0'
}

