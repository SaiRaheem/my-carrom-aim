//
// ─────────────────────────────────────────────────────────────────────────────
// TUNING TIPS
// ─────────────────────────────────────────────────────────────────────────────
//
// If detection is off (wrong board skin / lighting):
//   → Open VisionEngine.kt
//   → Use a color picker on a screenshot of Carrom Pool
//   → Adjust HSV ranges for STRIKER_LOWER/UPPER, WHITE/BLACK/RED coins
//
// If aim line flickers:
//   → Increase processInterval in OverlayService (e.g. 80L instead of 60L)
//
// If aim line is wrong direction:
//   → The touch tracking reads where your finger is on screen
//   → The striker-to-touch vector is the aim direction
//   → Works best when you touch ABOVE the striker (like in the game)
//
// ─────────────────────────────────────────────────────────────────────────────
